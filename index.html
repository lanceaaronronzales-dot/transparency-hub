<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SK Barangay Portal</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div id="emergency-announcement" class="announcement-banner"></div>

    <main class="dashboard-viewport-grid">
        <!-- Add these containers where you want them to appear -->
        <section id="bulletin-view" class="center-section-block">
            <h2>Bulletin Board</h2>
            <div id="general-bulletin-container"></div>
            
            <h2>Recent History (Past 30 Days)</h2>
            <div id="recent-history-container"></div>
            
            <h2>Permanent Archive</h2>
            <div id="permanent-archive-container"></div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
